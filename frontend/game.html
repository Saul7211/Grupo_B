<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 40 - Partida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-left">
      <div class="nav-brand">JUEGO 40</div>
      <span class="nav-status" id="statusText">Esperando cartas del motor...</span>
    </div>
    <div class="nav-right">
      <div class="chip chip-gold">
        <span class="dot"></span>
        <span id="balanceText">$0.00</span>
      </div>
      <button id="logoutBtn" class="btn-nav">Salir</button>
    </div>
  </header>

  <!-- Game -->
  <div class="game">

    <!-- Player 3 - top (partner) -->
    <div class="top-player">
      <div class="ptag">
        <span id="player3Name">Jugador 3</span>
        <span class="tm tm-a">Equipo A</span>
      </div>
      <div class="card-row" id="player3Cards"></div>
      <span class="card-count">Cartas: <strong id="player3CardCount">0</strong></span>
    </div>

    <!-- Player 2 - left -->
    <div class="side left">
      <div class="ptag">
        <span id="player2Name">Jugador 2</span>
        <span class="tm tm-b">B</span>
      </div>
      <div class="vertical-cards" id="player2Cards"></div>
      <span class="card-count">Cartas: <strong id="player2CardCount">0</strong></span>
    </div>

    <!-- Center -->
    <div class="center">

      <!-- Score bar -->
      <div class="scorebar">
        <div class="sb-cell">
          <span class="sb-label">Equipo A</span>
          <span class="sb-val teal" id="teamAScore">0</span>
          <span class="sb-sub">Perros: <strong id="teamAPerros">0</strong></span>
        </div>
        <div class="sb-cell">
          <span class="sb-label">Pozo</span>
          <span class="sb-val gold" id="potText">$0.00</span>
        </div>
        <div class="sb-cell">
          <span class="sb-label">Equipo B</span>
          <span class="sb-val gold" id="teamBScore">0</span>
          <span class="sb-sub">Perros: <strong id="teamBPerros">0</strong></span>
        </div>
        <div class="deck-mini">
          <div class="deck-icon"></div>
          <div>
            <span class="deck-num" id="deckCount">0</span>
            <span class="deck-txt">Mazo</span>
          </div>
        </div>
      </div>

      <!-- Turn -->
      <span class="turn-badge" id="turnText">Esperando...</span>

      <!-- Table -->
      <div class="table-zone" id="tableCards">
        <div class="card empty">+</div>
      </div>

    </div>

    <!-- Player 4 - right -->
    <div class="side right">
      <div class="ptag">
        <span id="player4Name">Jugador 4</span>
        <span class="tm tm-b">B</span>
      </div>
      <div class="vertical-cards" id="player4Cards"></div>
      <span class="card-count">Cartas: <strong id="player4CardCount">0</strong></span>
    </div>

    <!-- You - bottom -->
    <div class="bottom">
      <div class="your-info">
        <span class="your-name" id="player1Name">Tus cartas</span>
        <span class="your-hint">Selecciona una carta y opcionalmente cartas de la mesa para capturar</span>
      </div>
      <div class="your-hand card-row" id="player1Cards">
        <div class="card empty">...</div>
      </div>
      <div class="actions">
        <button class="btn-play" id="playCardBtn">Jugar carta</button>
        <button class="btn-sec" id="clearSelectionBtn">Limpiar</button>
        <button class="btn-danger" id="leaveRoomBtn">Salir de sala</button>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="socket-client.js"></script>

</body>
</html>
