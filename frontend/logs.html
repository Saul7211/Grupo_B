<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consola de Logs — Juego del 40</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0E141B;
    --panel:     #161F2A;
    --panel-2:   #1B2733;
    --border:    #243240;
    --text:      #C9D4E0;
    --muted:     #6B7B8C;
    --accent:    #E0B341;   /* dorado ficha */
    --accent-dim:#3a3115;

    --info:  #4DA8DA;
    --http:  #4FB477;
    --warn:  #E0A33E;
    --error: #E5564E;
    --debug: #9B7EDE;
    --raw:   #6B7B8C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 60px; }

  /* ── Header ── */
  header.top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 18px; flex-wrap: wrap;
    padding-bottom: 20px; margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .chip {
    width: 38px; height: 38px; border-radius: 9px;
    background: linear-gradient(145deg, var(--accent), #b88a1e);
    color: #1a1303; font-weight: 700; font-size: 17px;
    display: grid; place-items: center;
    box-shadow: 0 0 0 1px rgba(224,179,65,.25), 0 6px 18px rgba(224,179,65,.12);
  }
  .brand h1 { font-size: 20px; font-weight: 600; letter-spacing: -.01em; }
  .brand .sub { font-size: 12px; color: var(--muted); font-weight: 400; }

  .live {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
  }
  .live.on .dot { background: var(--http); box-shadow: 0 0 0 0 rgba(79,180,119,.5); animation: pulse 1.8s infinite; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(79,180,119,.5); }
    70%  { box-shadow: 0 0 0 7px rgba(79,180,119,0); }
    100% { box-shadow: 0 0 0 0 rgba(79,180,119,0); }
  }

  /* ── Controls ── */
  .controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .field { display: flex; align-items: center; gap: 8px; }
  label.lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  select, input[type="text"], button {
    font-family: 'JetBrains Mono', monospace;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; font-size: 13px; outline: none;
  }
  select:focus, input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"] { min-width: 230px; }
  input::placeholder { color: var(--muted); }

  .search { flex: 1; min-width: 200px; }

  button.act {
    cursor: pointer; transition: border-color .15s, color .15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  button.act:hover { border-color: var(--accent); color: var(--accent); }
  button.act:focus-visible { border-color: var(--accent); }
  button.act.armed { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── Level chips ── */
  .levels { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .lvl {
    cursor: pointer; user-select: none;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    padding: 7px 13px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted);
    display: inline-flex; align-items: center; gap: 8px;
    transition: border-color .15s, color .15s, background .15s;
  }
  .lvl .n {
    font-size: 11px; background: var(--panel-2); color: var(--text);
    padding: 1px 7px; border-radius: 20px; min-width: 22px; text-align: center;
  }
  .lvl[data-on="1"] { color: var(--text); }
  .lvl[data-lvl="ALL"][data-on="1"]   { border-color: var(--accent); color: var(--accent); }
  .lvl[data-lvl="INFO"][data-on="1"]  { border-color: var(--info);  color: var(--info); }
  .lvl[data-lvl="HTTP"][data-on="1"]  { border-color: var(--http);  color: var(--http); }
  .lvl[data-lvl="WARN"][data-on="1"]  { border-color: var(--warn);  color: var(--warn); }
  .lvl[data-lvl="ERROR"][data-on="1"] { border-color: var(--error); color: var(--error); }
  .lvl[data-lvl="DEBUG"][data-on="1"] { border-color: var(--debug); color: var(--debug); }

  /* ── Log stream ── */
  .stream {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .stream-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px; border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted);
  }
  .rows { max-height: 62vh; overflow-y: auto; }
  .rows::-webkit-scrollbar { width: 10px; }
  .rows::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .row {
    display: grid; grid-template-columns: 84px 64px 1fr;
    gap: 14px; align-items: baseline;
    padding: 8px 16px 8px 13px;
    border-left: 3px solid transparent;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.5;
    border-bottom: 1px solid rgba(36,50,64,.45);
  }
  .row:hover { background: var(--panel-2); }
  .row .ts  { color: var(--muted); white-space: nowrap; }
  .row .lv  { font-weight: 700; font-size: 11px; letter-spacing: .03em; }
  .row .msg { color: var(--text); word-break: break-word; }

  .row[data-lvl="INFO"]  { border-left-color: var(--info); }
  .row[data-lvl="HTTP"]  { border-left-color: var(--http); }
  .row[data-lvl="WARN"]  { border-left-color: var(--warn); }
  .row[data-lvl="ERROR"] { border-left-color: var(--error); }
  .row[data-lvl="DEBUG"] { border-left-color: var(--debug); }
  .row[data-lvl="INFO"]  .lv { color: var(--info); }
  .row[data-lvl="HTTP"]  .lv { color: var(--http); }
  .row[data-lvl="WARN"]  .lv { color: var(--warn); }
  .row[data-lvl="ERROR"] .lv { color: var(--error); }
  .row[data-lvl="DEBUG"] .lv { color: var(--debug); }
  .row[data-lvl="RAW"]   .lv { color: var(--raw); }

  .hl { background: rgba(224,179,65,.22); color: #fff; border-radius: 2px; }

  /* ── States ── */
  .state {
    padding: 54px 24px; text-align: center; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .state strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 14px; }
  .state code {
    display: inline-block; margin-top: 12px; padding: 8px 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    color: var(--accent); font-size: 12px;
  }
  .state.err strong { color: var(--error); }

  footer.foot {
    margin-top: 18px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted); text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="chip">40</div>
      <div>
        <h1>Consola de Logs</h1>
        <div class="sub">Backend · Juego del 40</div>
      </div>
    </div>
    <div class="live" id="liveBadge">
      <span class="dot"></span>
      <span id="liveTxt">en pausa</span>
    </div>
  </header>

  <div class="controls">
    <div class="field">
      <label class="lbl" for="fecha">Día</label>
      <select id="fecha"></select>
    </div>
    <input class="search" type="text" id="buscar" placeholder="Buscar usuario, ruta, mensaje…" autocomplete="off">
    <button class="act" id="btnRefrescar" title="Recargar ahora">↻ Recargar</button>
    <button class="act" id="btnAuto" title="Auto-refresco cada 5 s">● Auto</button>
  </div>

  <div class="levels" id="levels">
    <span class="lvl" data-lvl="ALL"   data-on="1">TODOS  <span class="n" id="n-ALL">0</span></span>
    <span class="lvl" data-lvl="INFO"  data-on="1">INFO   <span class="n" id="n-INFO">0</span></span>
    <span class="lvl" data-lvl="HTTP"  data-on="1">HTTP   <span class="n" id="n-HTTP">0</span></span>
    <span class="lvl" data-lvl="WARN"  data-on="1">WARN   <span class="n" id="n-WARN">0</span></span>
    <span class="lvl" data-lvl="ERROR" data-on="1">ERROR  <span class="n" id="n-ERROR">0</span></span>
    <span class="lvl" data-lvl="DEBUG" data-on="1">DEBUG  <span class="n" id="n-DEBUG">0</span></span>
  </div>

  <div class="stream">
    <div class="stream-head">
      <span id="contador">0 líneas</span>
      <span id="actualizado">—</span>
    </div>
    <div class="rows" id="rows">
      <div class="state"><strong>Cargando…</strong>Conectando con el backend.</div>
    </div>
  </div>

  <footer class="foot">Lee <span style="color:var(--accent)">/logs/data</span> · los más recientes aparecen arriba</footer>
</div>

<script>
  // ── Estado ──
  let TODOS = [];                 // todas las líneas del día
  let nivelesOn = new Set(['INFO','HTTP','WARN','ERROR','DEBUG','RAW']);
  let autoTimer = null;

  const $ = (id) => document.getElementById(id);
  const escapar = (s) => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  // ── Cargar lista de días disponibles ──
  async function cargarFechas() {
    try {
      const r = await fetch('/logs/fechas');
      const data = await r.json();
      const fechas = (data.fechas && data.fechas.length) ? data.fechas
                    : [new Date().toISOString().slice(0,10)];
      $('fecha').innerHTML = fechas.map(f => `<option value="${f}">${f}</option>`).join('');
    } catch (_e) {
      const hoy = new Date().toISOString().slice(0,10);
      $('fecha').innerHTML = `<option value="${hoy}">${hoy}</option>`;
    }
  }

  // ── Cargar logs del día seleccionado ──
  async function cargarLogs() {
    const fecha = $('fecha').value;
    try {
      const r = await fetch('/logs/data?fecha=' + encodeURIComponent(fecha));
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      TODOS = (data.lineas || []).slice().reverse();   // recientes arriba
      $('actualizado').textContent = 'actualizado ' + new Date().toLocaleTimeString();
      pintarConteos();
      render();
    } catch (e) {
      mostrarErrorBackend(e.message);
    }
  }

  function mostrarErrorBackend(msg) {
    $('rows').innerHTML =
      `<div class="state err"><strong>No se pudo leer /logs/data</strong>` +
      `Falta el endpoint en el backend, o no responde (${escapar(msg)}).` +
      `<code>Agrega la ruta GET /logs/data en routes/logs.js</code></div>`;
    ['ALL','INFO','HTTP','WARN','ERROR','DEBUG'].forEach(l => $('n-'+l).textContent = '0');
    $('contador').textContent = '0 líneas';
  }

  // ── Conteos por nivel ──
  function pintarConteos() {
    const c = { INFO:0, HTTP:0, WARN:0, ERROR:0, DEBUG:0, RAW:0 };
    TODOS.forEach(l => { c[l.nivel] = (c[l.nivel] || 0) + 1; });
    $('n-ALL').textContent  = TODOS.length;
    $('n-INFO').textContent = c.INFO;
    $('n-HTTP').textContent = c.HTTP;
    $('n-WARN').textContent = c.WARN;
    $('n-ERROR').textContent= c.ERROR;
    $('n-DEBUG').textContent= c.DEBUG;
  }

  // ── Render con filtros ──
  function render() {
    const q = $('buscar').value.trim().toLowerCase();
    const filtradas = TODOS.filter(l =>
      nivelesOn.has(l.nivel) &&
      (q === '' || (l.mensaje + ' ' + l.timestamp).toLowerCase().includes(q))
    );

    $('contador').textContent = filtradas.length + ' de ' + TODOS.length + ' líneas';

    if (filtradas.length === 0) {
      $('rows').innerHTML = TODOS.length === 0
        ? `<div class="state"><strong>Sin registros para este día</strong>El archivo de log está vacío o no existe.</div>`
        : `<div class="state"><strong>Nada coincide</strong>Prueba con otros niveles o limpia la búsqueda.</div>`;
      return;
    }

    const html = filtradas.map(l => {
      let msg = escapar(l.mensaje);
      if (q) {
        const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'ig');
        msg = msg.replace(re, '<span class="hl">$1</span>');
      }
      const ts = l.timestamp ? escapar(l.timestamp.split(' ')[1] || l.timestamp) : '';
      return `<div class="row" data-lvl="${escapar(l.nivel)}">` +
               `<span class="ts">${ts}</span>` +
               `<span class="lv">${escapar(l.nivel)}</span>` +
               `<span class="msg">${msg}</span>` +
             `</div>`;
    }).join('');
    $('rows').innerHTML = html;
  }

  // ── Filtros de nivel ──
  $('levels').addEventListener('click', (e) => {
    const chip = e.target.closest('.lvl');
    if (!chip) return;
    const lvl = chip.dataset.lvl;

    if (lvl === 'ALL') {
      const encender = chip.dataset.on === '0';
      document.querySelectorAll('.lvl').forEach(c => {
        c.dataset.on = encender ? '1' : '0';
      });
      nivelesOn = encender ? new Set(['INFO','HTTP','WARN','ERROR','DEBUG','RAW']) : new Set();
    } else {
      const on = chip.dataset.on === '1';
      chip.dataset.on = on ? '0' : '1';
      if (on) nivelesOn.delete(lvl); else nivelesOn.add(lvl);
      if (lvl === 'WARN' && !on) nivelesOn.add('RAW'); // RAW viaja con cualquiera; lo mantenemos simple
      // sincronizar el chip TODOS
      const todos = ['INFO','HTTP','WARN','ERROR','DEBUG'].every(x => nivelesOn.has(x));
      const chipAll = document.querySelector('.lvl[data-lvl="ALL"]');
      chipAll.dataset.on = todos ? '1' : '0';
    }
    render();
  });

  // ── Búsqueda ──
  $('buscar').addEventListener('input', render);

  // ── Recargar ──
  $('btnRefrescar').addEventListener('click', cargarLogs);

  // ── Auto-refresco ──
  $('btnAuto').addEventListener('click', () => {
    const badge = $('liveBadge');
    if (autoTimer) {
      clearInterval(autoTimer); autoTimer = null;
      $('btnAuto').classList.remove('armed');
      badge.classList.remove('on'); $('liveTxt').textContent = 'en pausa';
    } else {
      cargarLogs();
      autoTimer = setInterval(cargarLogs, 5000);
      $('btnAuto').classList.add('armed');
      badge.classList.add('on'); $('liveTxt').textContent = 'en vivo · 5s';
    }
  });

  // ── Cambio de día ──
  $('fecha').addEventListener('change', cargarLogs);

  // ── Init ──
  (async function init() {
    await cargarFechas();
    await cargarLogs();
  })();
</script>
</body>
</html>
