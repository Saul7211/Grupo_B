<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Juego 40</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0a0f;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(255,255,255,0.25);
      --text-primary: #f0f0f0;
      --text-secondary: rgba(255,255,255,0.5);
      --text-muted: rgba(255,255,255,0.3);
      --accent: #4ecdc4;
      --accent-glow: rgba(78,205,196,0.15);
      --danger: #ff6b6b;
      --suit-red: #c0392b;
      --suit-black: rgba(255,255,255,0.12);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Floating Cards Background ── */
    .card-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-card {
      position: absolute;
      width: 90px;
      height: 130px;
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .floating-card.red { color: rgba(192,57,43,0.3); }

    .floating-card .corner { line-height: 1; }
    .floating-card .corner-bottom { align-self: flex-end; transform: rotate(180deg); }
    .floating-card .center-suit {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      opacity: 0.4;
    }

    .floating-card:nth-child(1) {
      top: 8%; left: 5%;
      transform: rotate(-25deg);
      animation: float1 18s ease-in-out infinite;
    }
    .floating-card:nth-child(2) {
      top: 55%; left: 12%;
      transform: rotate(15deg);
      animation: float2 22s ease-in-out infinite;
    }
    .floating-card:nth-child(3) {
      top: 20%; left: 28%;
      transform: rotate(-8deg);
      animation: float3 20s ease-in-out infinite;
    }
    .floating-card:nth-child(4) {
      top: 70%; left: 3%;
      transform: rotate(30deg);
      animation: float1 25s ease-in-out infinite reverse;
    }
    .floating-card:nth-child(5) {
      top: 40%; left: 20%;
      transform: rotate(-18deg);
      animation: float2 16s ease-in-out infinite;
    }
    .floating-card:nth-child(6) {
      top: 85%; left: 25%;
      transform: rotate(12deg);
      animation: float3 19s ease-in-out infinite reverse;
    }
    .floating-card:nth-child(7) {
      top: 5%; left: 38%;
      transform: rotate(22deg);
      animation: float1 21s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translateY(0) rotate(-25deg); }
      50% { transform: translateY(-30px) rotate(-20deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(15deg); }
      50% { transform: translateY(25px) rotate(18deg); }
    }
    @keyframes float3 {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-20px) rotate(-12deg); }
    }

    /* ── Ambient glow ── */
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .ambient-1 {
      width: 500px; height: 500px;
      background: rgba(78,205,196,0.04);
      top: -10%; right: 10%;
    }
    .ambient-2 {
      width: 400px; height: 400px;
      background: rgba(78,205,196,0.03);
      bottom: -10%; left: 20%;
    }

    /* ── Layout ── */
    .login-wrapper {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100vw;
      height: 100vh;
      align-items: center;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .brand {
      text-align: center;
    }

    .brand h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 0.25rem;
      text-shadow: 0 0 60px rgba(78,205,196,0.15);
    }

    .brand .subtitle {
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .brand .suit-row {
      margin-top: 1.5rem;
      display: flex;
      gap: 1.2rem;
      justify-content: center;
    }

    .brand .suit-icon {
      font-size: 1.6rem;
      opacity: 0.2;
      transition: all 0.4s ease;
    }

    .brand:hover .suit-icon {
      opacity: 0.5;
    }

    .brand .suit-icon:nth-child(1),
    .brand .suit-icon:nth-child(3) {
      color: var(--suit-red);
    }

    /* ── Right Panel (Form) ── */
    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(20px);
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .auth-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      color: var(--text-primary);
    }

    .auth-card .form-subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .field input::placeholder {
      color: var(--text-muted);
    }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(78,205,196,0.04);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .remember input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .remember input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .remember input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      color: var(--bg-deep);
      font-weight: 700;
    }

    .forgot {
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .forgot:hover { opacity: 0.7; }

    .primary-btn {
      width: 100%;
      padding: 0.95rem;
      background: var(--text-primary);
      color: var(--bg-deep);
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .primary-btn:hover {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(78,205,196,0.2);
    }

    .primary-btn:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.75rem 0;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .signup-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .signup-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }

    .signup-link a:hover { opacity: 0.7; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .login-wrapper {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .left-panel {
        padding: 2rem 2rem 0;
      }
      .brand h1 { font-size: 3.5rem; }
      .right-panel { padding: 1.5rem; }
      .floating-card { display: none; }
    }
  </style>
</head>
<body>

  <!-- Ambient glow -->
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <!-- Floating cards background -->
  <div class="card-bg">
    <div class="floating-card">
      <span class="corner">A<br>♠</span>
      <span class="center-suit">♠</span>
      <span class="corner corner-bottom">A<br>♠</span>
    </div>
    <div class="floating-card red">
      <span class="corner">K<br>♥</span>
      <span class="center-suit">♥</span>
      <span class="corner corner-bottom">K<br>♥</span>
    </div>
    <div class="floating-card">
      <span class="corner">Q<br>♣</span>
      <span class="center-suit">♣</span>
      <span class="corner corner-bottom">Q<br>♣</span>
    </div>
    <div class="floating-card red">
      <span class="corner">J<br>♦</span>
      <span class="center-suit">♦</span>
      <span class="corner corner-bottom">J<br>♦</span>
    </div>
    <div class="floating-card">
      <span class="corner">10<br>♠</span>
      <span class="center-suit">♠</span>
      <span class="corner corner-bottom">10<br>♠</span>
    </div>
    <div class="floating-card red">
      <span class="corner">7<br>♥</span>
      <span class="center-suit">♥</span>
      <span class="corner corner-bottom">7<br>♥</span>
    </div>
    <div class="floating-card">
      <span class="corner">2<br>♣</span>
      <span class="center-suit">♣</span>
      <span class="corner corner-bottom">2<br>♣</span>
    </div>
  </div>

  <!-- Main layout -->
  <div class="login-wrapper">
    <div class="left-panel">
      <div class="brand">
        <h1>JUEGO 40</h1>
        <span class="subtitle">Cartas &bull; Apuestas &bull; Estrategia</span>
        <div class="suit-row">
          <span class="suit-icon">♥</span>
          <span class="suit-icon">♠</span>
          <span class="suit-icon">♦</span>
          <span class="suit-icon">♣</span>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="auth-card">
        <h2>Iniciar Sesión</h2>
        <p class="form-subtitle">Ingresa a tu cuenta para jugar</p>

        <div class="field">
          <label>Usuario</label>
          <input id="loginUsername" type="text" placeholder="Tu nombre de usuario">
        </div>

        <div class="field">
          <label>Contraseña</label>
          <input id="loginPassword" type="password" placeholder="••••••••">
        </div>

        <button id="loginBtn" class="primary-btn">Ingresar</button>

        <div class="divider">o</div>

        <p class="signup-link">
          ¿No tienes cuenta? <a href="register.html">Crear cuenta</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="socket-client.js"></script>

</body>
</html>
