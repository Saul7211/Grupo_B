<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Juego 40</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/register.css">

  <style>
      .google-btn{
        display:flex;align-items:center;justify-content:center;gap:.6rem;
        width:100%;padding:.8rem 1rem;margin-top:.25rem;
        background:#fff;color:#1f1f1f;font-family:'Outfit',sans-serif;font-weight:500;
        border:1px solid rgba(0,0,0,.15);border-radius:10px;
        text-decoration:none;cursor:pointer;transition:background .2s;
      }
      .google-btn:hover{ background:#f5f5f5; }
  </style>
</head>
<body>

  <div class="ambient a1"></div>
  <div class="ambient a2"></div>

  <div class="card-bg">
    <div class="fc"><span class="c">A<br>♠</span><span class="cs">♠</span><span class="c cb">A<br>♠</span></div>
    <div class="fc red"><span class="c">K<br>♥</span><span class="cs">♥</span><span class="c cb">K<br>♥</span></div>
    <div class="fc"><span class="c">Q<br>♣</span><span class="cs">♣</span><span class="c cb">Q<br>♣</span></div>
    <div class="fc red"><span class="c">J<br>♦</span><span class="cs">♦</span><span class="c cb">J<br>♦</span></div>
    <div class="fc"><span class="c">10<br>♠</span><span class="cs">♠</span><span class="c cb">10<br>♠</span></div>
    <div class="fc red"><span class="c">7<br>♥</span><span class="cs">♥</span><span class="c cb">7<br>♥</span></div>
    <div class="fc"><span class="c">2<br>♣</span><span class="cs">♣</span><span class="c cb">2<br>♣</span></div>
  </div>

  <div class="wrap">
    <div class="left">
      <div class="brand">
        <h1>JUEGO 40</h1>
        <span class="sub">Cartas &bull; Apuestas &bull; Estrategia</span>
        <div class="suits">
          <span class="si">♥</span>
          <span class="si">♠</span>
          <span class="si">♦</span>
          <span class="si">♣</span>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <p class="hint">Regístrate para empezar a jugar</p>

        <div class="field">
          <label>Usuario</label>
          <input id="registerUsername" type="text" placeholder="Elige un nombre de usuario">
        </div>

        <div class="field">
          <label>Contraseña</label>
          <input id="registerPassword" type="password" placeholder="••••••••">
        </div>

        <button id="registerBtn" class="primary-btn">Crear cuenta</button>

        <div class="divider">o</div>

        <a href="/auth/google" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.02-3.7H.96v2.34A9 9 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.98 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.02-2.34z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.94l3.02 2.34C4.68 5.16 6.66 3.58 9 3.58z"/>
          </svg>
          <span>Ingresar con Google</span>
        </a>

        <p class="link">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="socket-client.js"></script>

</body>
</html>
