<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Juego 40</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>

  <div class="ambient a1"></div>
  <div class="ambient a2"></div>

  <div class="card-bg">
    <div class="fc"><span class="c">A<br>♠</span><span class="cs">♠</span><span class="c cb">A<br>♠</span></div>
    <div class="fc red"><span class="c">K<br>♥</span><span class="cs">♥</span><span class="c cb">K<br>♥</span></div>
    <div class="fc"><span class="c">Q<br>♣</span><span class="cs">♣</span><span class="c cb">Q<br>♣</span></div>
    <div class="fc red"><span class="c">J<br>♦</span><span class="cs">♦</span><span class="c cb">J<br>♦</span></div>
    <div class="fc"><span class="c">10<br>♠</span><span class="cs">♠</span><span class="c cb">10<br>♠</span></div>
    <div class="fc red"><span class="c">7<br>♥</span><span class="cs">♥</span><span class="c cb">7<br>♥</span></div>
    <div class="fc"><span class="c">2<br>♣</span><span class="cs">♣</span><span class="c cb">2<br>♣</span></div>
  </div>

  <div class="wrap">
    <div class="left">
      <div class="brand">
        <h1>JUEGO 40</h1>
        <span class="sub">Cartas &bull; Apuestas &bull; Estrategia</span>
        <div class="suits">
          <span class="si">♥</span>
          <span class="si">♠</span>
          <span class="si">♦</span>
          <span class="si">♣</span>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <p class="hint">Regístrate para empezar a jugar</p>

        <div class="field">
          <label>Usuario</label>
          <input id="registerUsername" type="text" placeholder="Elige un nombre de usuario">
        </div>

        <div class="field">
          <label>Contraseña</label>
          <input id="registerPassword" type="password" placeholder="••••••••">
        </div>

        <button id="registerBtn" class="primary-btn">Crear cuenta</button>

        <div class="divider">o</div>

        <p class="link">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="socket-client.js"></script>

</body>
</html>
